services:
  db-turnos:
    image: mysql:8.4
    container_name: turnos-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-turnos}
      MYSQL_USER: ${MYSQL_USER:-agus}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-admin}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootadmin}
    ports:
      - "3307:3306"
    volumes:
      - mysql_turnos_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - turnos-network

  turnos-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: turnos-api
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-turnos:3306/${MYSQL_DATABASE:-turnos}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-agus}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-admin}
    depends_on:
      db-turnos:
        condition: service_healthy
    networks:
      - turnos-network

volumes:
  mysql_turnos_data:

networks:
  turnos-network:
    driver: bridge